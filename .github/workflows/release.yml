name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check tag and package version
        shell: bash
        run: |
          VERSION=$(node -p "require('./theme/manifest.json').version")
          test "$GITHUB_REF_NAME" = "v$VERSION"

      - name: Build, validate, and package
        run: npm run release:check

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./theme/manifest.json').version")
          gh release create "$GITHUB_REF_NAME" \
            "dist/chromet-dark-$VERSION.zip#Chrome Web Store package" \
            --generate-notes \
            --title "Chromet Dark $VERSION"
