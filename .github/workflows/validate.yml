name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate committed assets
        run: npm run validate

      - name: Rebuild assets
        run: npm run build

      # Sharp/libvips may encode equivalent PNG pixels differently across
      # operating systems, so validate decoded content instead of PNG bytes.
      - name: Validate rebuilt assets
        run: npm run validate
